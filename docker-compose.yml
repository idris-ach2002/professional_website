services:
  postgres:
    image: postgres:18
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: .
    container_name: portfolio-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      PORTFOLIO_ADMIN_USERNAME: ${PORTFOLIO_ADMIN_USERNAME}
      PORTFOLIO_ADMIN_PASSWORD: ${PORTFOLIO_ADMIN_PASSWORD}

      # Front local dev: http://localhost:5173
      # Front local preview: http://localhost:4173
      # Front prod Cloudflare: https://professional-website-front.achabou02idris.workers.dev
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4173,https://professional-website-front.achabou02idris.workers.dev}
      APP_FRONTEND_ALLOWED_ORIGINS: ${APP_FRONTEND_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:4173,https://professional-website-front.achabou02idris.workers.dev}
      APP_FRONTEND_ORIGIN: ${APP_FRONTEND_ORIGIN:-http://localhost:4173}

      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      HIBERNATE_FORMAT_SQL: ${HIBERNATE_FORMAT_SQL}
      HIBERNATE_HIGHLIGHT_SQL: ${HIBERNATE_HIGHLIGHT_SQL}

      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOAD_DIR: ${UPLOAD_DIR}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-portfolio}
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    networks:
      - portfolio-network

volumes:
  postgres-data:
  uploads-data:

networks:
  portfolio-network:
    driver: bridge
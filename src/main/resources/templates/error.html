<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur</title>
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.92);
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --danger: #fb7185;
            --border: rgba(148, 163, 184, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 34rem),
                    radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.16), transparent 30rem),
                    var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .card {
            width: min(560px, 100%);
            border: 1px solid var(--border);
            background: var(--panel);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        .code {
            color: var(--danger);
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.08em;
        }

        h1 {
            margin: 1rem 0 0.75rem;
            font-size: clamp(1.6rem, 4vw, 2.3rem);
        }

        p {
            margin: 0.4rem 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .path {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #cbd5e1;
            overflow-wrap: anywhere;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        a {
            text-decoration: none;
            border-radius: 999px;
            padding: 0.8rem 1.1rem;
            font-weight: 700;
        }

        .primary {
            color: #020617;
            background: var(--accent);
        }

        .secondary {
            color: var(--text);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
        }
    </style>
</head>
<body>
<main class="card">
    <div class="code" th:text="${status != null ? status : 'Erreur'}">Erreur</div>

    <h1>Une erreur est survenue</h1>

    <p>La requête n’a pas pu être traitée.</p>

    <div class="actions">
        <a class="primary" href="/">Retour</a>
        <a class="secondary" href="/login">Connexion</a>
    </div>
</main>
</body>
</html>

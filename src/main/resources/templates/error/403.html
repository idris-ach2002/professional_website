<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>403 — Accès refusé.</title>
    <style>
        :root { color-scheme: dark; --bg:#020617; --panel:rgba(15,23,42,.82); --line:rgba(186,230,253,.18); --text:#e0f2fe; --muted:#93c5fd; --accent:#38bdf8; --accent2:#14b8a6; }
        * { box-sizing: border-box; }
        body { min-height:100vh; margin:0; display:grid; place-items:center; padding:2rem; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--text); background:radial-gradient(circle at 20% 15%,rgba(56,189,248,.18),transparent 28rem), radial-gradient(circle at 85% 80%,rgba(20,184,166,.14),transparent 24rem), linear-gradient(135deg,var(--bg),#082f49 70%,#03131f); }
        .card { width:min(100%,760px); border:1px solid var(--line); border-radius:32px; background:var(--panel); backdrop-filter:blur(22px); padding:clamp(1.5rem,4vw,3rem); box-shadow:0 26px 90px rgba(8,47,73,.45); position:relative; overflow:hidden; }
        .card::before { content:""; position:absolute; inset:0; background:linear-gradient(115deg,rgba(255,255,255,.10),transparent 38%), repeating-radial-gradient(circle at 24% 28%,rgba(125,211,252,.18) 0 1px,transparent 1px 18px); opacity:.45; pointer-events:none; }
        .content { position:relative; z-index:1; }
        .code { display:inline-flex; align-items:center; gap:.5rem; padding:.55rem .85rem; border:1px solid rgba(125,211,252,.22); border-radius:999px; background:rgba(2,6,23,.35); color:#bae6fd; font-size:.8rem; letter-spacing:.12em; text-transform:uppercase; }
        .code::before { content:""; width:.55rem; height:.55rem; border-radius:999px; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 0 20px rgba(56,189,248,.75); }
        h1 { margin:1.3rem 0 .8rem; font-size:clamp(2.5rem,7vw,5rem); line-height:.92; letter-spacing:-.07em; }
        p { margin:0; color:#bfdbfe; font-size:1rem; line-height:1.7; }
        .details { margin-top:1.2rem; padding:1rem; border:1px solid rgba(186,230,253,.12); border-radius:20px; background:rgba(2,6,23,.30); color:var(--muted); font-size:.92rem; }
        .actions { display:flex; flex-wrap:wrap; gap:.8rem; margin-top:1.5rem; }
        a { display:inline-flex; align-items:center; justify-content:center; min-height:3rem; padding:0 1rem; border-radius:16px; text-decoration:none; font-weight:750; }
        .primary { color:#00111f; background:linear-gradient(135deg,#7dd3fc,#2dd4bf); }
        .secondary { color:#bae6fd; border:1px solid rgba(186,230,253,.18); background:rgba(2,6,23,.34); }

    </style>
</head>
<body>
<main class="card">
    <section class="content">
        <span class="code" th:text="${status != null ? status : '403'}">403</span>
        <h1>Accès refusé.</h1>
        <p>Tu es authentifié, mais ton compte ne dispose pas des droits nécessaires pour cette action.</p>

        <div class="details" th:if="${path != null or message != null or error != null}">
            <div th:if="${path != null}">Chemin : <span th:text="${path}">/path</span></div>
            <div th:if="${message != null}">Détail : <span th:text="${message}">message</span></div>
            <div th:if="${error != null}">Type : <span th:text="${error}">error</span></div>
        </div>

        <div class="actions">
            <a class="primary" href="/website/default">Retour au portfolio</a>
            <a class="secondary" href="/login">Accès manager</a>
        </div>
    </section>
</main>
</body>
</html>

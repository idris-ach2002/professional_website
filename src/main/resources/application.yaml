server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: none
        secure: true

spring:
  application:
    name: professional_website

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

portfolio:
  security:
    admin:
      username: ${PORTFOLIO_ADMIN_USERNAME}
      password: ${PORTFOLIO_ADMIN_PASSWORD}

storage:
  provider: ${STORAGE_PROVIDER:local}
  location: ${UPLOAD_DIR:/tmp/uploads}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:portfolio}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN}
  frontend:
    origin: ${APP_FRONTEND_ORIGIN:https://professional-website-front.achabou02idris.workers.dev}
server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  tomcat:
    max-swallow-size: ${MAX_SWALLOW_SIZE:12MB}
  servlet:
    session:
      cookie:
        same-site: none
        secure: true

spring:
  application:
    name: professional_website

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:12MB}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

portfolio:
  security:
    admin:
      username: ${PORTFOLIO_ADMIN_USERNAME}
      password: ${PORTFOLIO_ADMIN_PASSWORD}

storage:
  provider: ${STORAGE_PROVIDER:local}
  location: ${UPLOAD_DIR:/tmp/uploads}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:portfolio}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  cors:
    # Liste d'origines autorisées pour les appels API avec credentials.
    # Local dev Vite: http://localhost:5173
    # Local preview Vite: http://localhost:4173
    # Production Cloudflare: https://professional-website-front.achabou02idris.workers.dev
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173,http://localhost:4173,https://professional-website-front.achabou02idris.workers.dev}}
  frontend:
    # Origine utilisée comme fallback quand aucune URL redirect valide n'est fournie.
    origin: ${APP_FRONTEND_ORIGIN:https://professional-website-front.achabou02idris.workers.dev}
    # Origines acceptées pour les redirections post-login.
    allowed-origins: ${APP_FRONTEND_ALLOWED_ORIGINS:${APP_CORS_ALLOWED_ORIGINS:${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173,http://localhost:4173,https://professional-website-front.achabou02idris.workers.dev}}}
cv:
  generation:
    compiler: ${CV_LATEX_COMPILER:latexmk}
    timeout-seconds: ${CV_LATEX_TIMEOUT_SECONDS:45}
    store-latex-source: ${CV_STORE_LATEX_SOURCE:true}

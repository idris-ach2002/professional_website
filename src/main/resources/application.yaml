server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: professional_website

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
        highlight_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

portfolio:
  security:
    admin:
      username: ${PORTFOLIO_ADMIN_USERNAME}
      password: ${PORTFOLIO_ADMIN_PASSWORD}

storage:
  location: ${UPLOAD_DIR:/tmp/uploads}

management:
  endpoints:
    web:
      exposure:
        include: health